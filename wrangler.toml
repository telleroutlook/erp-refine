#:schema node_modules/wrangler/config-schema.json
name = "erp-refine"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = "frontend/dist", binding = "ASSETS", not_found_handling = "single-page-application" }

routes = [
  { pattern = "erp.3we.org", custom_domain = true }
]

[vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"
RATE_LIMIT_REQUESTS = "100"
RATE_LIMIT_PERIOD = "60"

# Supabase (project: teebltzefrkaedrufsuz — reused from ai-native-erp)
SUPABASE_URL = "https://teebltzefrkaedrufsuz.supabase.co"
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlZWJsdHplZnJrYWVkcnVmc3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MzY4NDYsImV4cCI6MjA5MTAxMjg0Nn0.uXEh5YmZ2qV-lJ3qHhIAENpqC59kDd6uh6BLD7fubuQ"

# AI (Zhipu GLM)
AI_MODEL_PRIMARY = "GLM-4.5-Air"
AI_MODEL_FAST = "GLM-4.5-Air"
AI_BASE_URL = "https://open.bigmodel.cn/api/coding/paas/v4"

# CORS
ALLOWED_ORIGINS = "https://erp.3we.org"

# Secrets (set via wrangler secret put — stored in .dev.vars locally):
# SUPABASE_SERVICE_ROLE_KEY
# AI_API_KEY
# JWT_SECRET

[[kv_namespaces]]
binding = "CACHE"
id = "d5e1939d610248f6ad3b74c820ac20e5"

[[kv_namespaces]]
binding = "SESSIONS"
id = "8b6fe8b41f814a04bef00e75fdde884e"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "erp-refine-storage"

[[queues.producers]]
binding = "EVENT_BUS"
queue = "erp-refine-events"

[[queues.consumers]]
queue = "erp-refine-events"

[durable_objects]
bindings = [
  { name = "CHAT_DO", class_name = "ERPChatAgent" },
  { name = "RATE_LIMITER_DO", class_name = "RateLimiterDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ERPChatAgent", "RateLimiterDO"]
